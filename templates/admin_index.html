<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin System</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-5">
    <h1>Admin System</h1>
    <div class="mb-3">
        <a href="{{ url_for('dashboard') }}" class="btn btn-info">Dashboard</a>
        <a href="{{ url_for('users') }}" class="btn btn-secondary">User Management</a>
        <a href="{{ url_for('logs') }}" class="btn btn-warning">Activity Logs</a>
        <a href="{{ url_for('logout') }}" class="btn btn-danger float-end">Logout</a>
    </div>
    <h3>Databases</h3>
    <ul>
        {% for db in dbs %}
        <li><a href="{{ url_for('db_overview', db_key=db) }}">{{ db }}</a></li>
        {% endfor %}
    </ul>
    <div class="mt-3">
        <a href="{{ url_for('invoice') }}" class="btn btn-primary">Generate Invoice</a>
        <a href="{{ url_for('quotation') }}" class="btn btn-primary">Generate Quotation</a>
    </div>
</div>
</body>
</html>
