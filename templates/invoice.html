<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Generate Invoice</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background: #e6e6e6; }
        .invoice-card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(20,30,60,0.08);
            padding: 2.5rem 2rem;
            max-width: 600px;
            margin: 3rem auto;
        }
        .invoice-header {
            background: #14203c;
            color: #fff;
            border-radius: 12px 12px 0 0;
            padding: 1.5rem 2rem 1rem 2rem;
            margin: -2.5rem -2rem 2rem -2rem;
        }
        .invoice-title { font-size: 2rem; font-weight: 700; }
        .invoice-table th { background: #14203c; color: #fff; }
        .invoice-table td, .invoice-table th { vertical-align: middle; }
        .totals-box {
            background: #14203c;
            color: #fff;
            border-radius: 8px;
            padding: 1rem 1.5rem;
            margin-top: 1.5rem;
        }
        .btn-primary { background: #14203c; border: none; }
        .btn-primary:hover { background: #1a2a4d; }
        .section-row td { background: #e8ecf4; font-weight: 700; color: #14203c; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px; }
        .btn-section { background: #3a5a8c; border: none; color: #fff; }
        .btn-section:hover { background: #2e4a72; color: #fff; }
    </style>
    <script>
        function addRow() {
            const table = document.getElementById('items');
            const row = table.insertRow();
            row.innerHTML = `<input type="hidden" name="row_type" value="item"><td><input name="item" class="form-control" required></td><td><input name="price" type="number" step="0.01" class="form-control" required></td><td><button type="button" class="btn btn-danger btn-sm" onclick="this.closest('tr').remove()">Remove</button></td>`;
        }
        function addSection() {
            const table = document.getElementById('items');
            const row = table.insertRow();
            row.className = 'section-row';
            row.innerHTML = `<input type="hidden" name="row_type" value="section"><input type="hidden" name="price" value="0"><td colspan="2"><input name="item" class="form-control form-control-sm" placeholder="Section heading (e.g. Hosting Services)" required></td><td><button type="button" class="btn btn-danger btn-sm" onclick="this.closest('tr').remove()">Remove</button></td>`;
        }
    </script>
</head>
<body>
<div class="invoice-card">
    <div class="invoice-header">
        <div class="invoice-title">Generate Invoice</div>
    </div>
    <form method="post">
        <div class="mb-3">
            <label for="invoice_title" class="form-label">Invoice Title</label>
            <input type="text" class="form-control" id="invoice_title" name="invoice_title" placeholder="e.g. MONTHLY INVOICE" value="MONTHLY INVOICE" required>
        </div>
        <div class="mb-3">
            <label for="client" class="form-label">Client Name</label>
            <input type="text" class="form-control" id="client" name="client" required>
        </div>
        <div class="row mb-3">
            <div class="col">
                <label for="invoice_date" class="form-label">Issue Date</label>
                <input type="date" class="form-control" id="invoice_date" name="invoice_date" required>
            </div>
            <div class="col">
                <label for="due_date" class="form-label">Due Date</label>
                <input type="date" class="form-control" id="due_date" name="due_date" required>
            </div>
        </div>
        <table class="table invoice-table" id="items">
            <thead><tr><th>Item</th><th>Price</th><th></th></tr></thead>
            <tbody>
            </tbody>
        </table>
        <div class="d-flex gap-2 mb-3">
            <button type="button" class="btn btn-secondary btn-sm" onclick="addRow()">+ Add Item</button>
            <button type="button" class="btn btn-section btn-sm" onclick="addSection()">+ Add Section</button>
        </div>
        <button type="submit" class="btn btn-primary">Generate Invoice PDF</button>
        <a href="{{ url_for('index') }}" class="btn btn-secondary">Back</a>
    </form>
</div>
</body>
</html>
