<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Generate Invoice</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background: #e6e6e6; }
        .invoice-card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(20,30,60,0.08);
            padding: 2.5rem 2rem;
            max-width: 600px;
            margin: 3rem auto;
        }
        .invoice-header {
            background: #14203c;
            color: #fff;
            border-radius: 12px 12px 0 0;
            padding: 1.5rem 2rem 1rem 2rem;
            margin: -2.5rem -2rem 2rem -2rem;
        }
        .invoice-title { font-size: 2rem; font-weight: 700; }
        .invoice-table th { background: #14203c; color: #fff; }
        .invoice-table td, .invoice-table th { vertical-align: middle; }
        .totals-box {
            background: #14203c;
            color: #fff;
            border-radius: 8px;
            padding: 1rem 1.5rem;
            margin-top: 1.5rem;
        }
        .btn-primary { background: #14203c; border: none; }
        .btn-primary:hover { background: #1a2a4d; }
    </style>
    <script>
        function addRow() {
            const table = document.getElementById('items');
            const row = table.insertRow();
            row.innerHTML = `<td><input name="item" class="form-control" required></td><td><input name="price" type="number" step="0.01" class="form-control" required></td><td><button type="button" class="btn btn-danger" onclick="this.closest('tr').remove()">Remove</button></td>`;
        }
    </script>
</head>
<body>
<div class="invoice-card">
    <div class="invoice-header">
        <div class="invoice-title">Generate Invoice</div>
    </div>
    <form method="post">
        <div class="mb-3">
            <label for="client" class="form-label">Client Name</label>
            <input type="text" class="form-control" id="client" name="client" required>
        </div>
        <table class="table invoice-table" id="items">
            <thead><tr><th>Item</th><th>Price</th><th></th></tr></thead>
            <tbody>
                <tr>
                    <td><input name="item" class="form-control" required></td>
                    <td><input name="price" type="number" step="0.01" class="form-control" required></td>
                    <td></td>
                </tr>
            </tbody>
        </table>
        <button type="button" class="btn btn-secondary" onclick="addRow()">Add Item</button>
        <button type="submit" class="btn btn-primary">Generate Invoice PDF</button>
        <a href="{{ url_for('index') }}" class="btn btn-secondary">Back</a>
    </form>
</div>
</body>
</html>
